<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Не удается получить доступ к сайту</title>
    <style>
        body {
            background-color: #fff;
            color: #202124;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 75%;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .interstitial-wrapper {
            box-sizing: border-box;
            max-width: 600px;
            width: 100%;
            padding: 0 24px;
            margin-top: 10vh;
        }
        .icon {
            margin-bottom: 25px;
        }
        h1 {
            font-size: 1.6em;
            font-weight: normal;
            margin: 0 0 15px;
            line-height: 1.25;
        }
        p {
            font-size: 1.05em;
            line-height: 1.5;
            margin: 0 0 15px;
            color: #5f6368;
        }
        ul {
            margin: 0 0 15px;
            padding-left: 40px;
            color: #5f6368;
            font-size: 1.05em;
            line-height: 1.5;
        }
        li {
            margin-bottom: 5px;
        }
        .error-code {
            color: #70757a;
            font-size: 0.85em;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .nav-wrapper {
            margin-top: 35px;
        }
        button {
            background: #1a73e8;
            border: 0;
            border-radius: 4px;
            box-sizing: border-box;
            color: #fff;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 0.875em;
            margin: 0;
            padding: 8px 16px;
            transition: box-shadow 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:hover {
            background: #1b66c9;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #202124;
                color: #e8eaed;
            }
            p, ul, .error-code {
                color: #9aa0a6;
            }
            button {
                background: #8ab4f8;
                color: #202124;
            }
            button:hover {
                background: #93baf9;
            }
            svg {
                fill: #9aa0a6;
            }
        }
    </style>
</head>
<body>
    <div class="interstitial-wrapper">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="#5f6368">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>
        <h1>Не удается получить доступ к сайту</h1>
        <p>Сайт <strong>debavit.kz</strong> неожиданно разорвал соединение.</p>
        <p>Попробуйте сделать следующее:</p>
        <ul>
            <li>Проверьте подключение к интернету.</li>
            <li>Проверьте настройки прокси-сервера и брандмауэра.</li>
        </ul>
        <p class="error-code">ERR_CONNECTION_CLOSED</p>
        
        <div class="nav-wrapper">
            <button onclick="window.location.reload();">Перезагрузить</button>
        </div>
    </div>
</body>
</html>
